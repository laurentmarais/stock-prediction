services:
  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      MARKET_DATA_PROVIDER: yahoo
      FUNDAMENTALS_PROVIDER: yahoo
      MACRO_DATA_PROVIDER: fred
      EVENT_DATA_PROVIDER: public

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
